<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perspective</title>
  <link rel="stylesheet" href="Perspective.css">
</head>

<body>
  <div>
    <header class="site-header">
      <div class="logo">PERSPECTIVE</div>
    </header>

    <main class="viewer-grid">
      <aside class="planet-panel">
        <div class="panel-head">
          <h2>Choose a body</h2>
        </div>
        <div class="planet-list">
          <button class="planet-button" data-body="sun">Sun</button>
          <button class="planet-button" data-body="mercury">Mercury</button>
          <button class="planet-button" data-body="venus">Venus</button>
          <button class="planet-button active" data-body="earth">Earth</button>
          <button class="planet-button" data-body="moon">Moon</button>
          <button class="planet-button" data-body="mars">Mars</button>
          <button class="planet-button" data-body="jupiter">Jupiter</button>
          <button class="planet-button" data-body="saturn">Saturn</button>
          <button class="planet-button" data-body="uranus">Uranus</button>
          <button class="planet-button" data-body="neptune">Neptune</button>
          <button class="planet-button" data-body="pluto">Pluto</button>
        </div>
      </aside>

      <section class="stage-card">
        <div class="sphere-shell" aria-label="Rotating planet sphere">
        </div>

        <article class="info-card">
          <div class="info-head">
            <span class="info-label">Selected body</span>
            <h2 id="planetName">Earth</h2>
          </div>
          <div class="info-grid">
            <div>
              <span>Diameter</span>
              <strong id="planetDiameter"> km</strong>
            </div>
            <div>
              <span>Gravity</span>
              <strong id="planetGravity">9.8 m/s²</strong>
            </div>
            <div>
              <span>Surface</span>
              <strong id="planetSurface">Water, continents, clouds</strong>
            </div>
          </div>
        </article>
      </section>
    </main>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="Perspective.js"></script>
</body>

</html>
